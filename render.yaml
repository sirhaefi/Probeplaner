services:
  - type: web
    name: probenplaner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SHEET_ID
        value: 1ytHSYObmi1GG3Kok1F-TFLUH0EloWljpiclLIhuBkxg
      - key: BASE_URL
        sync: false
